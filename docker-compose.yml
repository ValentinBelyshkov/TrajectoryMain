version: "3.8"

services:
  TerraSLAM:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=1000
        - GID=1000
    image: trajectory-main:prod
    container_name: TerraSLAM
    # Auto-restart container if it crashes
    restart: unless-stopped
    
    runtime: nvidia
    cap_add:
      - SYS_PTRACE #for debug

    # Networking for ROS2
    network_mode: host
    ipc: host
    
    devices:
      - "/dev/video0:/dev/video0"      # USB-камера
      - "/dev/i2c-1:/dev/i2c-1"        # I2C
      

    # Volumes: Persist data, NOT code
    volumes:
      # Time sync
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      # Media input (read-only if possible)
      - /media:/media:ro
      # Persist maps, configs, logs
      - terra_data:/home/orb/.ros
      - terra_logs:/var/log/supervisor
      # X11 for GUI (optional)
      - ${XAUTHORITY:-/dev/null}:/tmp/.Xauthority:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/runtime-orb:/tmp/runtime-orb:rw 
      - ./Database:/home/orb/Database:rw
      - ./TerraSLAM_relay:/home/orb/TerraSLAM_relay:rw
      - ./ORB_SLAM3:/home/orb/ORB_SLAM3:rw
    
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - XDG_RUNTIME_DIR=/tmp/runtime-orb
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROSBRIDGE_PORT=9091
    
    # Health check: Verify ROS2 is responsive
    healthcheck:
      test: ["CMD", "ros2", "topic", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits (adjust for Jetson)
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

volumes:
  terra_data:
  terra_logs:
 
